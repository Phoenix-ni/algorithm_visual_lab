services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        TORCH_INDEX_URL: ${TORCH_INDEX_URL:-https://download.pytorch.org/whl/cpu}
        PYPI_INDEX_URL: ${PYPI_INDEX_URL:-https://pypi.org/simple}
    image: algorithm-visual-lab-backend:latest
    container_name: algorithm-visual-lab-backend
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/app/data
    environment:
      PYTHONUNBUFFERED: "1"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    image: algorithm-visual-lab-frontend:latest
    container_name: algorithm-visual-lab-frontend
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  backend_data:
